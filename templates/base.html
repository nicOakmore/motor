<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Construction Budget Engine{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="wrap">
      <a class="brand" href="{{ url_for('index') }}">
        Construction Budget Engine
      </a>
      <nav>
        <a href="{{ url_for('how_pdf') }}">How it works (PDF, Spanish)</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="wrap">
    <small>
      Sample app. RD 1098/2001 · Ley 37/1992 · LUIB 12/2017.
      Generated budgets are indicative; they require validation by a qualified technician.
    </small>
  </footer>
</body>
</html>
