services:
  - type: web
    name: motor-presupuestos
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: JOBS_ROOT
        value: /tmp/rex-jobs
